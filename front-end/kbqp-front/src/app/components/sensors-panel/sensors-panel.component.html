<section class="card panel-with-info">
  <aside class="panel-side">
    <info-dialog-btn
      title="Sensors & trends"
      body="Latest reading per metric plus a trend chart (browser only, last ~80 samples). One chart point per simulated 30 min sub-step. Two drivers per machine: temperature (°C) and vibration (RMS) each cycle Normal → Overworked → Rest independently (arrow hints: → normal drift, ↑ worsens that signal only, ↓ eases toward nominal). Halt uses a lower stress band: 5 consecutive sub-steps where temperature OR vibration exceeds that band. Halted machines keep last readings until Fix. Reset clears charts."
    />
  </aside>
  <div class="panel-content">
    <div class="panel-heading">
      <h3>Sensors & trends</h3>
    </div>
    <div class="table sensors sensors-grouped">
      <div class="table-head sensors-grouped-head">
        <div class="th">Metric</div>
        <div class="th right">Value</div>
        <div class="th right">Time</div>
      </div>

      <div class="table-body sensors-grouped-body sensors-with-charts scroll-pad">
        @for (g of groups(); track g.machineId) {
          <div class="sensor-group" [class]="machineGroupClass(g.slug)">
            <div class="sensor-group-head">
              <span class="tag">{{ g.machineId }}</span>
              <div class="workload-drivers">
                <button
                  type="button"
                  class="btn secondary workload-btn workload-btn-metric"
                  [class.workload-state-normal]="temperatureWorkloadOf(g.machineId) === 'NORMAL'"
                  [class.workload-state-overworked]="temperatureWorkloadOf(g.machineId) === 'OVERWORKED'"
                  [class.workload-state-rest]="temperatureWorkloadOf(g.machineId) === 'REST'"
                  [title]="temperatureTitle()"
                  [disabled]="controlsBusy"
                  (click)="workloadCycle.emit({ machineId: g.machineId, metric: 'TEMPERATURE_C' })"
                >
                  <span class="workload-metric-label">°C</span>
                  {{ workloadLabel(temperatureWorkloadOf(g.machineId)) }}
                </button>
                <button
                  type="button"
                  class="btn secondary workload-btn workload-btn-metric"
                  [class.workload-state-normal]="vibrationWorkloadOf(g.machineId) === 'NORMAL'"
                  [class.workload-state-overworked]="vibrationWorkloadOf(g.machineId) === 'OVERWORKED'"
                  [class.workload-state-rest]="vibrationWorkloadOf(g.machineId) === 'REST'"
                  [title]="vibrationTitle()"
                  [disabled]="controlsBusy"
                  (click)="workloadCycle.emit({ machineId: g.machineId, metric: 'VIBRATION_RMS' })"
                >
                  <span class="workload-metric-label">RMS</span>
                  {{ workloadLabel(vibrationWorkloadOf(g.machineId)) }}
                </button>
              </div>
              @if (isHalted(g.machineId)) {
                <span class="pill warn tag-halted">halted</span>
              }
            </div>
            <div class="sensor-metrics-grid">
              @for (s of g.rows; track s.metric) {
                <div class="sensor-metric-card" [class.sensor-row-stale]="isHalted(g.machineId)">
                  <div class="tr sensor-metric-row">
                    <div class="td mono">{{ s.metric }}</div>
                    <div class="td mono right">{{ s.value.toFixed(2) }}</div>
                    <div class="td mono muted date-cell right">{{ s.ts | prettyDate }}</div>
                  </div>
                  <div class="sensor-sparkline-wrap">
                    <sensor-sparkline
                      [points]="history().get(g.machineId + '|' + s.metric) ?? emptyPoints"
                      [metricLabel]="s.metric"
                    />
                  </div>
                </div>
              }
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
